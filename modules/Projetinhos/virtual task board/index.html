<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Board :)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <aside>
        <nav>
            <div class="tabs" id="newTask">Add Task</div>
            <div class="tabs" id="delete">Delete last task</div>
            <select class="tabs" id="difficulty">
                <option value="black">Difficulty of the Task</option>
                <option value="darkred">Very Hard</option>
                <option value="red">Hard</option>
                <option value="yellow">Normal</option>
                <option value="lime">Easy</option>
                <option value="cyan">Very Easy</option>
            </select>
            <div class="tabs" id="cleanBoard">Clean Board</div>
        </nav>
    </aside>
    <main id="main"></main>
    <script src="./script.js"></script>
</body>
</html>
